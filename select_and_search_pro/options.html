<!DOCTYPE html>
<html>
<head>
  <title>Extension Options</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 6px 18px rgba(17, 24, 39, 0.08);
      --primary: #2563eb;
      --primaryHover: #1d4ed8;
      --danger: #ef4444;
      --dangerHover: #dc2626;
    }

    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      margin: 0;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
    }

    h2 {
      margin: 0 0 14px 0;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    p {
      margin: 6px 0 14px 0;
      color: var(--muted);
      line-height: 1.4;
      font-size: 13px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 14px;
    }

    input[type="text"], input[type="url"], input[type="number"] {
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }
    input[type="text"]:focus, input[type="url"]:focus, input[type="number"]:focus {
      border-color: rgba(37, 99, 235, 0.7);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    input[type="checkbox"], input[type="radio"] {
      accent-color: var(--primary);
    }

    button.primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 9px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }
    button.primary:hover { background: var(--primaryHover); }

    button.danger {
      background: var(--danger);
      color: white;
      border: none;
      padding: 7px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }
    button.danger:hover { background: var(--dangerHover); }

    .status { margin-top: 10px; color: #16a34a; display: none; font-size: 13px; }
    
    /* Search Box Styles */
    .search-box-container {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-box-container input {
      flex: 1;
      font-size: 14px;
    }
    
    /* Search History Styles */
    .history-container {
      padding-top: 4px;
    }
    .history-title {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .clear-history-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
    }
    .clear-history-btn:hover {
      color: #ff4444;
      text-decoration: underline;
    }
    .history-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .history-chip {
      background: #f3f4f6;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 13px;
      cursor: pointer;
      max-width: 150px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #333;
    }
    .history-chip:hover {
      background: #e5e7eb;
    }

    .footer {
      margin-top: 30px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    #engineList {
      margin-top: 10px;
    }

    .engine-header {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f9fafb;
      font-weight: 700;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .engine-item {
      display: flex;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      margin-bottom: 8px;
    }

    .engine-item:hover {
      background: #fbfbff;
      border-color: rgba(37, 99, 235, 0.25);
    }

    .add-engine {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      align-items: center;
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    #newEngineName { flex: 1; }
    #newEngineUrl { flex: 1.6; }
    #addEngineBtn {
      width: 60px;
      padding: 7px 10px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="search-box-container">
        <input type="text" id="popupSearchInput" placeholder="Search..." autofocus>
        <button id="popupSearchBtn" class="primary">Search</button>
      </div>

      <div class="history-container" id="historyContainer" style="display: none;">
        <div class="history-title">
          Recent Searches
          <button id="clearHistoryBtn" class="clear-history-btn">Clear History</button>
        </div>
        <div class="history-chips" id="historyChips"></div>
      </div>
    </div>

    <div class="card">
      <h2>Settings</h2>

      <div class="section">
        <label>
          <input type="checkbox" id="showToolbar">
          Show selection toolbar (Copy/Search popup)
        </label>
        <div style="margin-top: 10px;">
          <label style="color: var(--muted); font-size: 13px;">
            Auto-hide toolbar (ms, 0=off):
            <input type="number" id="toolbarAutoHideMs" min="0" step="100" style="width: 140px; margin-left: 6px;">
          </label>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Search Engines</h3>
      <p>Use: default engine for toolbar click. On: enable engine. Bar: show on toolbar (1-3).</p>
      <div id="engineList"></div>
      
      <div class="add-engine">
        <input type="text" id="newEngineName" placeholder="Name (e.g. MySearch)">
        <input type="url" id="newEngineUrl" placeholder="URL with %s (e.g. https://search.com?q=%s)">
        <button id="addEngineBtn" class="primary">Add</button>
      </div>

      <div class="status" id="status">Settings saved.</div>
    </div>

    <div class="footer" id="versionInfo"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
